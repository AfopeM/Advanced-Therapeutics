name: E2E Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # ── THE MISSING STEP: build the extension into dist/ ──
      - name: Build extension
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      # Run only the focused critical-path spec (covers the full user journey)
      - name: Run critical-path E2E tests
        run: xvfb-run --auto-servernum npx playwright test tests/e2e/critical-path.spec.ts

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
